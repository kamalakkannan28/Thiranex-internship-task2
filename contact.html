<h2>Send a Message</h2>

<form>

<label for="name">Full Name</label>

<input

id="name"

required

<br><br>

type="email"
id="email"
name="email"
required
aria-required="true">

<br><br>

<textarea
id="message"
name="message"
rows="5"
required
aria-required="true">

<br><br>

<button type="submit">

Send Message
